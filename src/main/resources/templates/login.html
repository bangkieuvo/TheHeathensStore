<!DOCTYPE html>
<html lang="en">
<head>
	<title>Login</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<link rel="icon" type="image/png" href="assets/images/icons/logo.png"/>

	<link rel="stylesheet" type="text/css" href="assets/vendor/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="assets/fonts/font-awesome-4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" type="text/css" href="assets/fonts/iconic/css/material-design-iconic-font.min.css">
	<link rel="stylesheet" type="text/css" href="assets/fonts/linearicons-v1.0.0/icon-font.min.css">
	<link rel="stylesheet" type="text/css" href="assets/vendor/animate/animate.css">	
	<link rel="stylesheet" type="text/css" href="assets/vendor/css-hamburgers/hamburgers.min.css">
	<link rel="stylesheet" type="text/css" href="assets/vendor/animsition/css/animsition.min.css">
	<link rel="stylesheet" type="text/css" href="assets/vendor/select2/select2.min.css">
	<link rel="stylesheet" type="text/css" href="assets/vendor/perfect-scrollbar/perfect-scrollbar.css">

	<link rel="stylesheet" type="text/css" href="assets/css/util.css">
	<link rel="stylesheet" type="text/css" href="assets/css/main.css">
</head>
<body class="animsition">

	<!-- ===== HEADER (GIỮ NGUYÊN 100%) ===== -->
	<header class="header-v4">
		<!-- copy nguyên header của bạn -->
	</header>

	<!-- ===== CART + FAVORITE (GIỮ NGUYÊN) ===== -->
	<!-- copy nguyên block cart + favorite -->

	<!-- ===== TITLE PAGE ===== -->
	<section class="bg-img1 txt-center p-lr-15 p-tb-92" style="background-image: url('assets/images/bg-01.jpg');">
		<h2 class="ltext-105 cl0 txt-center">
			Login
		</h2>
	</section>	

	<!-- ===== LOGIN CONTENT ===== -->
	<section class="bg0 p-t-75 p-b-120">
		<div class="container">
			<div class="row justify-content-center">
				
				<div class="col-md-6 col-lg-5">
					<div class="p-lr-25 p-tb-30 bor1">

						<h3 class="mtext-111 cl2 p-b-30 txt-center">
							Account Login
						</h3>

						<form action="login" method="post">

							<div class="p-b-20">
								<label class="stext-102 cl3">Email</label>
								<input class="size-111 bor8 stext-102 cl2 p-lr-20" 
									type="email" name="email" placeholder="Enter your email">
							</div>

							<div class="p-b-20">
								<label class="stext-102 cl3">Password</label>
								<input class="size-111 bor8 stext-102 cl2 p-lr-20" 
									type="password" name="password" placeholder="Enter your password">
							</div>

							<div class="flex-w flex-sb-m p-b-20">
								<label class="flex-c-m stext-102 cl3">
									<input type="checkbox" class="m-r-5">
									Remember me
								</label>

								<a href="#" class="stext-102 cl1">
									Forgot password?
								</a>
							</div>

							<button type="submit" 
								class="flex-c-m stext-101 cl0 size-116 bg3 bor14 hov-btn3 p-lr-15 trans-04 pointer">
								Login
							</button>

							<div class="p-t-20 txt-center">
								<span class="stext-102 cl3">
									Don't have an account?
								</span>

								<a href="register" class="stext-102 cl1">
									Register
								</a>
							</div>

						</form>

					</div>
				</div>

			</div>
		</div>
	</section>	

	<!-- ===== FOOTER (GIỮ NGUYÊN) ===== -->
	<footer class="bg3 p-t-75 p-b-32">
		<!-- copy nguyên footer -->
	</footer>

	<!-- Back to top -->
	<div class="btn-back-to-top" id="myBtn">
		<span class="symbol-btn-back-to-top">
			<i class="zmdi zmdi-chevron-up"></i>
		</span>
	</div>

	<!-- ===== JS GIỮ NGUYÊN ===== -->
	<script src="assets/vendor/jquery/jquery-3.2.1.min.js"></script>
	<script src="assets/vendor/animsition/js/animsition.min.js"></script>
	<script src="assets/vendor/bootstrap/js/popper.js"></script>
	<script src="assets/vendor/bootstrap/js/bootstrap.min.js"></script>
	<script src="assets/vendor/select2/select2.min.js"></script>

	<script>
		$(".js-select2").each(function(){
			$(this).select2({
				minimumResultsForSearch: 20,
				dropdownParent: $(this).next('.dropDownSelect2')
			});
		})
	</script>

	<script src="assets/vendor/MagnificPopup/jquery.magnific-popup.min.js"></script>
	<script src="assets/vendor/perfect-scrollbar/perfect-scrollbar.min.js"></script>

	<script>
		$('.js-pscroll').each(function(){
			$(this).css('position','relative');
			$(this).css('overflow','hidden');
			var ps = new PerfectScrollbar(this);

			$(window).on('resize', function(){
				ps.update();
			})
		});
	</script>

	<script src="assets/js/main.js"></script>

</body>
</html>
